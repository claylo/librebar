boundaries:
  - name: cli_boundary
    description: User-supplied CLI flags shape startup behavior, working directory, and logging verbosity.
    modules: [cli, lib]
    notes: CommonArgs is embedded into consumer CLIs and then fed into startup.
  - name: config_boundary
    description: Rebar deserializes untrusted TOML, YAML, and JSON from project and user config locations.
    modules: [config, lib]
    notes: Discovery walks parent directories and merges multiple files into typed config.
  - name: filesystem_logging_boundary
    description: Logging resolves writable directories from env vars, config, and platform defaults before opening files.
    modules: [logging, lib]
    notes: Logging can touch stderr, cwd, platform log dirs, and env-controlled paths.
  - name: runtime_signal_boundary
    description: Shutdown installs OS signal listeners and spawns tasks into Tokio.
    modules: [shutdown, lib]
    notes: This is the main async/runtime assumption in the crate.
  - name: otel_network_boundary
    description: Optional OTEL export sends spans to an external collector over HTTP or gRPC.
    modules: [otel, lib]
    notes: Endpoint and protocol selection come from environment variables.
  - name: mcp_stdio_boundary
    description: The MCP helper exposes stdin/stdout transport for protocol traffic.
    modules: [mcp]
    notes: This keeps protocol traffic off stdout for logging correctness.
