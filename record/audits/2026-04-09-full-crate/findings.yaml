            end_line: 218
        evidence: |
          pub fn add_text(&mut self, name: &str, content: &str) -> Result<()> {
              self.files
                  .push((name.to_string(), content.as_bytes().to_vec()));
              Ok(())
          }

          pub fn add_bytes(&mut self, name: &str, data: &[u8]) -> Result<()> {
              self.files.push((name.to_string(), data.to_vec()));
              Ok(())
          }
        evidence_lang: rust
        evidence_markers:
          - lines: "1"
            type: mark
            label: "Result<()> but body is infallible"
        mechanism: |
          Both methods push to a Vec and return Ok(()) unconditionally. The
          Result return type forces callers to handle a ? that can never
          trigger, and signals that the operation may fail when it cannot.
        remediation: |
          Change return type to &mut Self for builder-style chaining, or
          simply return (). Reserve Result for finish() which does actual I/O.
        temporal:
