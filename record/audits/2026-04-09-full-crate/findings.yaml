      no MaybeUninit, no manual memory management, and all Drop
      implementations are correct.
    verdict: >
      Clean. The #![deny(unsafe_code)] directive provides a compile-time
      guarantee. All Box usage is for trait objects (required), all Vec
      instances are bounded and short-lived, and the three Drop
      implementations (OtelGuard, LockGuard, LoggingGuard) correctly
      manage their resources without panicking.

    findings: []

  - slug: concurrency-surface
    title: The Concurrency Surface
    thesis: >
      Async code is minimal, well-bounded, and uses appropriate primitives
      with no shared mutable state across module boundaries.
    verdict: >
      Clean. No std::sync::Mutex, no Arc, no unsafe impl Send/Sync, no
      lock-across-await patterns. The shutdown watch channel is sound and
      idempotent. The HTTP timeout correctly covers the full request
      lifecycle. The only minor note is synchronous filesystem I/O in
      cache.rs called from the async update::check(), which is acceptable
      for a startup-time operation.

