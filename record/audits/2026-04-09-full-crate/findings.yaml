    title: The Supply Chain Surface
    thesis: >
      Dependency choices are deliberate and well-gated, except opentelemetry-otlp
      whose default features smuggle a redundant HTTP stack into the tree.
    verdict: >
      The otel feature is the only real supply chain concern. Fixing default-features
      on one dependency eliminates reqwest + tower + tower-http and drops the
      transitive count by ~50 crates. Everything else — the feature gating strategy,
      the serde-saphyr-over-serde_yaml choice, the hyper-direct-over-reqwest
      decision — is solid.

