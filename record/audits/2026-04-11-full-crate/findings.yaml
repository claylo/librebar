    thesis: "The default crate surface is dependency-disciplined, but two optional features currently pull upstream RustSec warnings that should be either upgraded away or documented as accepted risk."
    verdict: "This is not a default-install emergency. `cargo deny check -c .config/deny.toml` passes and there are no hard vulnerability failures in the resolved tree. The remaining issues are feature-scoped warnings: the benchmark-only gungraun path carries unmaintained `bincode`, and the OTEL stack carries a fresh `rand` warning. Both are manageable, but leaving them untracked means the next dependency review starts from rediscovery instead of policy."

