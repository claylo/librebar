        mechanism: |
          The README tells users that `log_dir` from their config participates
          in log-target resolution and that the builder initializes logging
          after loading config. The implementation does load `C`, but
          `ConfiguredBuilder::start()` never passes that value into logging
          initialization. `init_subsystems()` builds `LoggingConfig` only from
