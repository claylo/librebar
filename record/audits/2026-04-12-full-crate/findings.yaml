        evidence: |
          //! # Environment variables
          //!
          //! - `OTEL_EXPORTER_OTLP_ENDPOINT` — collector URL (required for export)
          //! - `OTEL_EXPORTER_OTLP_PROTOCOL` — `http/protobuf` (default), `http/json`, or `grpc`

          # Feature: otel
          opentelemetry = { version = "0.31", features = ["trace"], optional = true }
          opentelemetry_sdk = { version = "0.31", features = ["trace", "rt-tokio"], optional = true }
          opentelemetry-otlp = { version = "0.31", default-features = false, features = ["http-proto", "hyper-client", "trace"], optional = true }

          fn build_exporter(endpoint: &str, protocol: &str) -> Result<opentelemetry_otlp::SpanExporter> {
              match protocol {
                  #[cfg(feature = "otel-grpc")]
                  "grpc" => opentelemetry_otlp::SpanExporter::builder()
                      .with_tonic()
                      .with_endpoint(endpoint)
                      .build()
                      .map_err(crate::Error::OtelInit),

                  // http/protobuf, http/json, or anything else — use HTTP transport
                  _ => opentelemetry_otlp::SpanExporter::builder()
                      .with_http()
                      .with_endpoint(endpoint)
                      .build()
                      .map_err(crate::Error::OtelInit),
              }
          }
        evidence_lang: text
        evidence_markers:
          - lines: "4"
            type: del
            label: "docs claim http/json is supported"
          - lines: "8"
            type: mark
            label: "only http-proto is enabled in dependencies"
          - lines: "18-21"
            type: del
            label: "http/json is routed through the same HTTP/protobuf path"
        mechanism: |
          The module docs explicitly tell users that
          `OTEL_EXPORTER_OTLP_PROTOCOL=http/json` is supported. The dependency
          configuration only enables `http-proto`, and the exporter builder
          routes both `http/protobuf` and `http/json` through the same
          `with_http()` path. That means a user selecting `http/json` does not
          get JSON OTLP; they still get protobuf-over-HTTP, with no warning
          that the requested protocol is unavailable.
        remediation: |
          Remove `http/json` from the documented protocol list unless the crate
          actually enables and selects a JSON OTLP transport. If JSON transport
          is not planned, reject unknown protocol values explicitly so users do
          not get silent protocol mismatch.
