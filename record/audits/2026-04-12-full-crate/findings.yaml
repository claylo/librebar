    findings:
      - slug: cache-set-ttl-overflow
        title: "Caller-supplied cache TTL can overflow expiry arithmetic"
        concern: significant
        locations:
          - path: src/cache.rs
            start_line: 69
            end_line: 80
        evidence: |
          pub fn set(&self, key: &str, value: &[u8], ttl: Duration) -> Result<()> {
              std::fs::create_dir_all(&self.dir).map_err(CacheError::from)?;

              let now = SystemTime::now()
                  .duration_since(UNIX_EPOCH)
                  .unwrap_or_default();
              let expires_at = now.as_secs() + ttl.as_secs();

              let entry = CacheEntry {
                  expires_at,
                  value: base64::engine::general_purpose::STANDARD.encode(value),
              };
        evidence_lang: rust
        evidence_markers:
          - lines: "7"
            type: del
            label: "unchecked u64 addition can panic or wrap"
        mechanism: |
          A library caller controls `ttl`, and `now.as_secs() + ttl.as_secs()`
          uses unchecked `u64` addition. Extremely large durations can panic in
          debug builds and silently wrap in release builds, producing a bogus
          expiry timestamp that can invalidate cache semantics. This is not
          theoretical arithmetic pedantry; it is a public API taking unbounded
          caller input and using wraparound-sensitive math for visible behavior.
        remediation: |
          Validate TTL arithmetic before constructing the cache entry. Use
          checked or saturating addition and return a typed error when the
          requested expiry cannot be represented.
        temporal:
          introduced: "2026-04-09"
          last_modified: "2026-04-09"
          commit_count: 2
        chains:
          enables: []
          enabled_by: []
          related: []
        effort: small
        effort_notes: "Localized to one calculation and, if desired, one new error variant."

      - slug: cache-clear-drops-delete-errors
        title: "Cache clearing reports success after discarding per-entry read and delete failures"
        concern: moderate
        locations:
          - path: src/cache.rs
            start_line: 145
            end_line: 159
        evidence: |
          pub fn clear(&self) -> Result<()> {
              if self.dir.exists() {
                  for entry in std::fs::read_dir(&self.dir)
                      .map_err(CacheError::from)?
                      .flatten()
                  {
                      let path = entry.path();
                      if path.extension().and_then(|e| e.to_str()) == Some("json") {
                          // Best-effort: skip files that can't be removed (permissions, etc.)
                          let _ = std::fs::remove_file(&path);
                      }
                  }
              }
              Ok(())
          }
        evidence_lang: rust
        evidence_markers:
          - lines: "4-5"
            type: del
            label: "iterator entry errors are flattened away"
          - lines: "9-10"
            type: del
            label: "delete failures are discarded"
        mechanism: |
          `read_dir(...).flatten()` silently drops iterator errors for
          individual directory entries, and `let _ = std::fs::remove_file(...)`
          suppresses deletion failures. As a result, `Cache::clear` can return
          `Ok(())` even when some cache files were unreadable or could not be
          removed, so callers cannot tell whether the cache was actually
          cleared.
        remediation: |
          Preserve per-entry failures instead of discarding them. Return the
          first deletion/read error, or add a distinct best-effort API that
          explicitly reports partial cleanup rather than signaling
          unconditional success.
        temporal:
          introduced: "2026-04-09"
          last_modified: "2026-04-09"
          commit_count: 3
        chains:
          enables: []
          enabled_by: []
          related: []
        effort: small
        effort_notes: "Localized behavior change, but the API contract needs an explicit choice."

      - slug: update-check-hides-check-failures
        title: "Update checks collapse transport and parse failures into the same None as no-update"
        concern: moderate
        locations:
          - path: src/update.rs
            start_line: 89
            end_line: 138
        evidence: |
          pub async fn check(&self) -> Option<UpdateInfo> {
              if self.is_suppressed() {
                  tracing::debug!("update check suppressed by env");
                  return None;
              }

              if let Some(cache) = crate::cache::Cache::default_for(&self.app_name)
                  && let Ok(Some(cached)) = cache.get(CACHE_KEY)
                  && let Ok(version) = String::from_utf8(cached)
              {
                  tracing::debug!(cached_version = %version, "using cached version check");
                  return self.compare_versions(&version);
              }

              let client =
                  crate::http::HttpClient::from_app(&self.app_name, &self.current_version).ok()?;

              let resp = match client.get(&url).await {
                  Ok(r) => r,
                  Err(e) => {
                      tracing::debug!(error = %e, "update check failed");
                      return None;
                  }
              };

              if !resp.is_success() {
                  tracing::debug!(status = resp.status, "GitHub API returned non-200");
                  return None;
              }

              let json: serde_json::Value = match resp.json() {
                  Ok(v) => v,
                  Err(e) => {
                      tracing::debug!(error = %e, "failed to parse release response");
                      return None;
                  }
              };
        evidence_lang: rust
        evidence_markers:
          - lines: "1"
            type: del
            label: "public API exposes only Option"
          - lines: "14-15"
            type: del
            label: "client construction failure becomes None"
          - lines: "19-22"
            type: del
            label: "network failure becomes None"
          - lines: "25-28"
            type: del
            label: "HTTP failure becomes None"
          - lines: "31-36"
            type: del
            label: "parse failure becomes None"
        mechanism: |
          This public library API performs several fallible operations but
          exposes only `Option<UpdateInfo>`. Client construction failure,
          request errors, non-2xx responses, malformed JSON, missing fields,
          invalid cached bytes, and cache write failures are all collapsed into
          `None`, which is also the normal "no update available" outcome.
          Debug logs are not a stable diagnostic channel for library callers,
          so callers cannot reliably distinguish transient infrastructure
          failure from a genuine negative result.
        remediation: |
          Expose a typed error channel for failed checks, for example by
          returning `Result<Option<UpdateInfo>, UpdateError>` or by adding a
          second API that preserves failure reasons while keeping the current
          convenience wrapper.
        temporal:
          introduced: "2026-04-09"
          last_modified: "2026-04-09"
          commit_count: 3
        chains:
          enables: []
          enabled_by: []
