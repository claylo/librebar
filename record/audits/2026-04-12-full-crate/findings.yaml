    thesis: "The crate uses typed errors consistently, but a few public entry points still overflow, discard cleanup failures, or erase the distinction between failure and a legitimate negative result."
    verdict: "This surface is disciplined enough that the findings cluster into a small set of patterns rather than a pervasive error culture problem. The cache TTL overflow is the most concrete behavioral bug; the other issues are loss-of-signal problems that will frustrate callers and operators once they appear in production."

