        evidence_lang: text
        evidence_markers:
          - lines: "2"
            type: del
            label: "token is an Option, so the example does not compile as shown"
          - lines: "8-10"
            type: mark
            label: "the accessor is explicitly optional"
          - lines: "12-13"
            type: del
            label: "start-up requires an active Tokio runtime"
        mechanism: |
          The published shutdown example is not reachable as written.
          `app.shutdown_token()` returns `Option<ShutdownToken>`, so
          `token.cancelled()` does not compile without an unwrap/expect. Even
          after fixing that, `.shutdown().start()?` calls `register_signals()`,
          which immediately requires a current Tokio runtime and returns
          `Error::NoRuntime` in a normal synchronous `main()`. A developer
          following the module docs hits both a type mismatch and an
          undocumented runtime prerequisite before they can use the advertised
          entry point.
        remediation: |
          Fix the docs to show an async entry point with `#[tokio::main]` (or
          equivalent runtime setup) and unwrap the shutdown token explicitly.
          Longer term, consider making the API stateful enough that enabling
          shutdown yields a non-optional token accessor, or surface the runtime
          requirement directly in the builder docs and error text.
