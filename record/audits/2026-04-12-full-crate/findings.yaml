audit_date: 2026-04-12
scope: "Fresh full-library audit — src/, tests/, Cargo.toml, README.md, and feature-gated API surface"
commit: 89431caaefbdffcdaf2f0a3077c891ad27e4625b
assessment: |
  rebar's supported verification path is clean: `cargo nextest run --workspace
  --all-features` passes 88/88, `cargo +1.94.1 clippy --all-targets
  --all-features -- -D warnings` passes, `cargo deny check --config
  .config/deny.toml` passes, and the crate-wide `#![deny(unsafe_code)]`
  posture holds. The sharpest problems are not memory safety bugs or failing
  tests; they are mismatches at the documentation and API seam, where several
  advertised capabilities are either not wired at all or require hidden setup.
  **The Completeness Surface** is the most urgent: the shutdown example does
  not compile or run as written, logging docs promise config-driven `log_dir`
  behavior that the builder never implements, CLI scripting flags are parsed
  but left inert, and OTEL docs overstate supported transport protocols.
  **The Builder Contract Surface** narrows the advertised preloaded-config
  escape hatch with unnecessary serde/default bounds. **The Error Handling
  Surface** stays typed in most places, but cache expiry arithmetic can wrap
  and several public APIs silently collapse or discard failure information.
  **The Performance Surface** is structurally sound but pays avoidable
  allocation tax in JSON logging and HTTP response handling. **The Supply
  Chain Surface** is mostly clean on the supported path, with one remaining
  benchmark-only RustSec warning inherited through `gungraun`. Overall
  posture: solid core library with real polish debt at the docs-and-contracts
  boundary.

