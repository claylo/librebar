        effort_notes: "Localized code change, but the public contract likely needs an additive API."

  - slug: performance-surface
    title: "The Performance Surface"
    thesis: "The crate is not algorithmically troubled, but two hot-path implementations pay avoidable allocation and copy costs that will show up first under logging-heavy or network-heavy workloads."
    verdict: "These are not premature-optimization complaints. Both findings sit on surfaces the crate explicitly sells: structured logging and HTTP/update helpers. The code is clear, but it currently trades that clarity for repeated heap traffic in steady-state paths."

    findings:
      - slug: logging-layer-clones-span-fields-per-event
        title: "JSON logging clones span field maps and re-allocates field keys on every event"
        concern: significant
        locations:
          - path: src/logging.rs
            start_line: 437
            end_line: 515
        evidence: |
          if let Some(scope) = ctx.event_scope(event) {
              for span in scope.from_root() {
                  if let Some(fields) = span.extensions().get::<SpanFields>() {
                      map.extend(fields.values.clone());
                  }
              }
          }

          let mut visitor = JsonVisitor::default();
          event.record(&mut visitor);
          map.extend(visitor.values);

          if let Ok(mut buf) = serde_json::to_vec(&Value::Object(map)) {
              buf.push(b'\n');
              let mut writer = self.writer.make_writer();
              if writer.write_all(&buf).is_err() {
                  eprintln!("[rebar] failed to write log entry to sink");
              }
          }
          }

          #[derive(Clone, Debug)]
          struct SpanFields {
              values: Map<String, Value>,
          }

          #[derive(Default)]
          struct JsonVisitor {
              values: Map<String, Value>,
          }

          impl tracing::field::Visit for JsonVisitor {
              fn record_bool(&mut self, field: &tracing::field::Field, value: bool) {
                  self.values
                      .insert(field.name().to_string(), Value::Bool(value));
              }

              fn record_str(&mut self, field: &tracing::field::Field, value: &str) {
                  self.values
                      .insert(field.name().to_string(), Value::String(value.to_string()));
              }

              fn record_debug(&mut self, field: &tracing::field::Field, value: &dyn std::fmt::Debug) {
                  self.values.insert(
                      field.name().to_string(),
                      Value::String(format!("{value:?}")),
                  );
              }
        evidence_lang: rust
        evidence_markers:
          - lines: "1-4"
            type: del
            label: "each event clones the accumulated span-field map"
          - lines: "33-34"
            type: mark
            label: "field names are re-owned as Strings on every visit"
          - lines: "37-38"
            type: mark
            label: "borrowed strings are copied into new heap values"
          - lines: "41-44"
            type: mark
            label: "debug fields are formatted into fresh Strings"
        mechanism: |
          `JsonLogLayer::on_event` is the steady-state path for every emitted
          log event once logging is enabled. It walks the active span stack and
          clones each stored `Map<String, Value>` into the event object, then
          the visitor allocates owned `String` keys for every field name and
          formats debug fields into new strings before `serde_json` serializes
          the result. Under nested spans or high event rates this turns one
          logical event into repeated hash-map cloning, string allocation, and
          copying work that profiles will attribute to logging rather than
          application code.
        remediation: |
          Keep span fields in a representation that can be merged without
          cloning entire maps per event, and serialize directly into the output
          buffer so static field names and borrowed string data are not
          re-owned on every visit. A writer-based visitor or cached per-span
          encoding would remove most of the avoidable heap traffic.
        temporal:
          introduced: "2026-04-08"
          last_modified: "2026-04-09"
          commit_count: 3
        chains:
          enables: []
          enabled_by: []
          related: []
        effort: medium
        effort_notes: "Local redesign of span-field storage and JSON emission, isolated to logging."

      - slug: http-response-body-is-copied-once-and-often-cloned-again
        title: "HTTP response handling duplicates body buffers on the request path"
        concern: moderate
        locations:
          - path: src/http.rs
            start_line: 124
            end_line: 174
        evidence: |
          let body = resp
              .into_body()
              .collect()
              .await
              .map_err(HttpError::Body)?
              .to_bytes();

          Ok(Response {
              status,
              body: body.to_vec(),
          })
          };

          pub struct Response {
              pub status: u16,
              body: Vec<u8>,
          }

          impl Response {
              pub fn text(&self) -> std::result::Result<String, std::string::FromUtf8Error> {
                  String::from_utf8(self.body.clone())
              }
        evidence_lang: rust
        evidence_markers:
          - lines: "1-10"
            type: del
            label: "collected Bytes are copied into a fresh Vec<u8>"
          - lines: "19-20"
            type: del
            label: "text() clones the full body again"
        mechanism: |
          `HttpClient::get` is the hot path for the crate's `http` surface and
          is also exercised by the update checker. After Hyper has already
          consolidated the response into `Bytes`, the implementation
          immediately duplicates that buffer with `to_vec()` to build
          `Response`. Callers that use the convenient `text()` accessor then
          pay a second full-body clone. On larger payloads or repeated polling
          endpoints this adds an unconditional O(n) memcpy cost before any
          caller-specific processing.
        remediation: |
          Store the response body in `Bytes` or another cheaply
          clonable/borrowable buffer and keep owned decoding on consuming APIs.
          The shared-reference accessor should stay borrow-based so callers do
          not need to duplicate the body just to inspect text.
        temporal:
          introduced: "2026-04-08"
          last_modified: "2026-04-09"
          commit_count: 3
        chains:
          enables: []
          enabled_by: []
          related: []
        effort: small
        effort_notes: "Local to `Response` storage and conversion helpers."

